<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator Analisa Ide Perbaikan</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:#f3efe6;}

@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

.ag-root{
  --paper:#f3efe6; --paper-2:#ece7db; --card:#faf8f2;
  --ink:#1b1a17; --ink-2:#514d45; --ink-3:#8a847a;
  --line:rgba(27,26,23,.14); --line-strong:rgba(27,26,23,.30);
  --accent:#cf3b24; --accent-2:#a82d18; --accent-soft:rgba(207,59,36,.09);
  --steel:#33536e; --ok:#2f6b46;
  --serif:'Newsreader',Georgia,serif;
  --grotesk:'Archivo','Segoe UI',sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  font-family:var(--grotesk);
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(rgba(27,26,23,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(27,26,23,.035) 1px,transparent 1px);
  background-size:26px 26px;
  min-height:100vh;
  padding:28px 16px 64px;
  -webkit-font-smoothing:antialiased;
}
.ag-wrap{max-width:980px;margin:0 auto;}

.ag-header{position:relative;border:1.5px solid var(--ink);background:var(--card);
  padding:26px 26px 22px;margin-bottom:22px;
  box-shadow:6px 6px 0 rgba(27,26,23,.10);}
.ag-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--accent-2);font-weight:600;margin-bottom:8px;}
.ag-title{font-family:var(--grotesk);font-weight:900;font-size:clamp(28px,5.4vw,46px);
  line-height:.96;letter-spacing:-.02em;margin:0;}
.ag-title em{font-style:normal;color:var(--accent);}
.ag-sub{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);
  margin-top:12px;letter-spacing:.04em;}
.ag-stamp{position:absolute;top:20px;right:22px;width:78px;height:78px;
  border:2px solid var(--accent);color:var(--accent);transform:rotate(-9deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:7px;opacity:.92;}
.ag-stamp b{font-family:var(--grotesk);font-weight:800;font-size:18px;line-height:1;}
.ag-stamp span{font-family:var(--mono);font-size:8px;letter-spacing:.16em;margin-top:3px;}

.ag-card{border:1.5px solid var(--ink);background:var(--card);
  padding:22px 22px 24px;box-shadow:6px 6px 0 rgba(27,26,23,.08);}
.ag-card-h{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-2);display:flex;align-items:center;gap:8px;
  padding-bottom:14px;margin-bottom:18px;border-bottom:1px dashed var(--line-strong);}
.ag-field{margin-bottom:18px;}
.ag-label{display:flex;align-items:baseline;gap:9px;font-family:var(--mono);
  font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink);
  font-weight:600;margin-bottom:7px;}
.ag-label .n{color:var(--accent);font-weight:700;}
.ag-input,.ag-textarea{width:100%;box-sizing:border-box;background:#fff;
  border:1.5px solid var(--line-strong);border-radius:3px;
  padding:11px 13px;font-family:var(--serif);font-size:15px;color:var(--ink);
  transition:border-color .15s,box-shadow .15s;outline:none;resize:vertical;}
.ag-textarea{min-height:84px;line-height:1.5;}
.ag-input:focus,.ag-textarea:focus{border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);}
.ag-input::placeholder,.ag-textarea::placeholder{color:var(--ink-3);font-style:italic;}

.ag-seg{display:flex;flex-wrap:wrap;gap:8px;}
.ag-seg-btn{flex:1 1 auto;min-width:120px;background:#fff;border:1.5px solid var(--line-strong);
  border-radius:3px;padding:10px 12px;cursor:pointer;font-family:var(--mono);
  font-size:11.5px;font-weight:600;letter-spacing:.04em;color:var(--ink-2);
  text-transform:uppercase;transition:all .14s;text-align:center;}
.ag-seg-btn:hover{border-color:var(--ink);color:var(--ink);}
.ag-seg-btn.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}

.ag-pwd{border:1.5px dashed var(--accent);background:var(--accent-soft);border-radius:4px;
  padding:14px 15px;margin-bottom:18px;}
.ag-pwd .t{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--accent-2);
  display:flex;align-items:center;gap:7px;margin-bottom:9px;font-weight:600;}

.ag-generate{width:100%;margin-top:6px;background:var(--accent);color:#fff;
  border:1.5px solid var(--accent-2);border-radius:3px;padding:15px;cursor:pointer;
  font-family:var(--grotesk);font-weight:800;font-size:15px;letter-spacing:.04em;
  text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .1s,box-shadow .15s,background .15s;
  box-shadow:4px 4px 0 rgba(27,26,23,.18);}
.ag-generate:hover:not(:disabled){background:var(--accent-2);}
.ag-generate:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(27,26,23,.18);}
.ag-generate:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
.ag-hint{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:10px;text-align:center;}
.ag-spin{animation:agspin 1s linear infinite;}
@keyframes agspin{to{transform:rotate(360deg);}}

.ag-error{margin-top:16px;border:1.5px solid var(--accent);background:var(--accent-soft);
  border-radius:3px;padding:14px 16px;font-family:var(--mono);font-size:12.5px;color:var(--accent-2);
  display:flex;gap:10px;align-items:flex-start;}

.ag-doc{margin-top:30px;border:1.5px solid var(--ink);background:var(--card);
  box-shadow:8px 8px 0 rgba(27,26,23,.10);overflow:hidden;}
.ag-doc-head{position:relative;padding:30px 30px 24px;border-bottom:3px double var(--ink);
  background:linear-gradient(180deg,#fbfaf5,#f5f1e8);}
.ag-doc-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;
  color:var(--accent-2);font-weight:600;}
.ag-doc-title{font-family:var(--grotesk);font-weight:900;font-size:clamp(22px,4vw,34px);
  line-height:1.04;letter-spacing:-.018em;margin:11px 0 16px;max-width:84%;}
.ag-meta{display:flex;flex-wrap:wrap;gap:8px 10px;}
.ag-meta-item{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
  border:1px solid var(--line-strong);border-radius:20px;padding:5px 12px;color:var(--ink-2);
  display:flex;align-items:center;gap:6px;background:#fff;}
.ag-meta-item b{color:var(--ink);font-weight:600;}

.ag-body{padding:8px 30px 32px;}
.ag-section{padding:26px 0;border-bottom:1px dashed var(--line-strong);
  opacity:0;animation:agup .5s ease forwards;}
.ag-section:last-child{border-bottom:none;}
@keyframes agup{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.ag-shead{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
.ag-snum{flex:none;width:34px;height:34px;border-radius:50%;background:var(--accent);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--grotesk);font-weight:800;font-size:15px;
  box-shadow:0 0 0 4px var(--accent-soft);}
.ag-stitle{font-family:var(--grotesk);font-weight:800;font-size:18px;letter-spacing:-.01em;
  line-height:1.1;}
.ag-sicon{margin-left:auto;color:var(--ink-3);}
.ag-prose{font-family:var(--serif);}
.ag-p{font-family:var(--serif);font-size:16px;line-height:1.66;color:#2a2823;margin:0 0 12px;}
.ag-p:last-child{margin-bottom:0;}

.ag-callout{margin:14px 0 4px;border-left:4px solid var(--accent);background:var(--accent-soft);
  padding:13px 16px;border-radius:0 4px 4px 0;}
.ag-callout .k{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent-2);font-weight:700;display:block;margin-bottom:5px;}
.ag-callout .v{font-family:var(--serif);font-size:15.5px;line-height:1.55;color:#2a2823;}

.ag-fishbox{margin:18px 0 4px;border:1px solid var(--line-strong);border-radius:5px;
  background:#fffdf8;padding:14px 10px 6px;}
.ag-fishcap{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);text-align:center;margin:2px 0 6px;}
.ag-fishscroll{overflow-x:auto;}
.ag-attach{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--accent-2);
  border:1px dashed var(--accent);border-radius:3px;padding:3px 8px;margin-bottom:8px;}

.ag-bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:6px;}
.ag-bcard{border:1.5px solid var(--line-strong);border-radius:4px;background:#fff;
  padding:14px 15px;display:flex;flex-direction:column;}
.ag-bhead{display:flex;align-items:center;gap:9px;margin-bottom:10px;
  padding-bottom:9px;border-bottom:1px dashed var(--line);}
.ag-bhead .ic{width:30px;height:30px;border-radius:6px;background:var(--ink);color:var(--paper);
  display:flex;align-items:center;justify-content:center;flex:none;}
.ag-bhead .lb{font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;}
.ag-bopt{display:flex;gap:8px;align-items:flex-start;background:var(--accent-soft);
  border:1px solid var(--accent);border-radius:4px;padding:9px 11px;margin-bottom:9px;}
.ag-bopt .ck{flex:none;color:var(--accent);margin-top:1px;}
.ag-bopt .tx{font-family:var(--grotesk);font-weight:600;font-size:13px;line-height:1.34;color:var(--ink);}
.ag-breason{font-family:var(--serif);font-size:14px;line-height:1.55;color:var(--ink-2);}
.ag-breason b{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);display:block;margin-bottom:3px;font-weight:600;}

.ag-actions{display:flex;flex-wrap:wrap;gap:10px;padding:20px 30px;background:var(--paper-2);
  border-top:1.5px solid var(--ink);}
.ag-act{flex:1 1 auto;min-width:140px;display:flex;align-items:center;justify-content:center;gap:8px;
  border-radius:3px;padding:11px 14px;cursor:pointer;font-family:var(--mono);font-size:11.5px;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all .14s;}
.ag-act.solid{background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);}
.ag-act.solid:hover{background:var(--accent);border-color:var(--accent);}
.ag-act.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line-strong);}
.ag-act.ghost:hover{border-color:var(--ink);}
.ag-note{font-family:var(--mono);font-size:10px;line-height:1.6;color:var(--ink-3);
  padding:14px 30px 22px;display:flex;gap:8px;align-items:flex-start;background:var(--card);}

@media(max-width:680px){
  .ag-root{padding:18px 10px 48px;}
  .ag-header{padding:22px 18px 18px;}
  .ag-stamp{display:none;}
  .ag-doc-head{padding:22px 18px 20px;}
  .ag-doc-title{max-width:100%;}
  .ag-body{padding:4px 18px 24px;}
  .ag-bgrid{grid-template-columns:1fr;}
  .ag-actions{padding:16px 18px;}
  .ag-note{padding:12px 18px 18px;}
}
</style>

    "Memperbaiki standar yang mempengaruhi aspek lingkungan hidup",
    "Standar baru yang memberi pengaruh pada aspek lingkungan hidup" ] },
  { key: "manfaat", label: "Manfaat", icon: IShare, options: [
    "Dapat dimanfaatkan bagian kaizen di plant/divisi sendiri",
    "Dapat dimanfaatkan juga oleh bagian kaizen di plant/divisi lain",
    "Dapat dimanfaatkan oleh bagian kaizen di plant/divisi lain",
    "Dapat dimanfaatkan juga pada industri yang berbeda (supplier, dealer, dll)",
    "Dapat dimanfaatkan oleh semua karyawan plant/divisi sendiri" ] },
  { key: "usaha", label: "Usaha", icon: IHammer, options: [
    "Ada perhitungan-perhitungan teknis dan pemenuhan syarat terhadap aturan resmi",
    "Perlu kesungguhan untuk merealisasikan",
    "Perlu kesungguhan dan memerlukan waktu yang panjang untuk merealisasikan",
    "Realisasinya menghadapi masalah kompleks dan perlu persetujuan pihak lain",
    "Dapat direalisasikan dengan mudah" ] },
  { key: "kepekaan", label: "Kepekaan", icon: IEye, options: [
    "Memperbaiki hal-hal yang terabaikan",
    "Ide baru di mana orang lain tidak menyadarinya",
    "Memperbaiki atas saran/keluhan orang lain",
    "Memperbaiki hal-hal yang telah berjalan tetapi tidak tepat tujuan/sasaran",
    "Inisiatif sendiri pada masalah yang parah" ] },
  { key: "keaslian", label: "Keaslian", icon: IFinger, options: [
    "Merupakan gabungan dari ide-ide yang lain",
    "Kombinasi dari ide-ide yang lain, tapi ada penyempurnaan dari idenya sendiri",
    "Ide baik yang dapat didaftarkan hak patennya",
    "Merupakan ide yang kreatif dan inovatif",
    "Gagasannya ada tetapi kecil" ] },
];

const FISH_CATS = [
  { key: "Manusia", color: "#cf3b24", pos: "top", base: 250 },
  { key: "Metode", color: "#2f6b46", pos: "top", base: 470 },
  { key: "Lingkungan", color: "#2b6f7a", pos: "top", base: 690 },
  { key: "Mesin", color: "#33536e", pos: "bot", base: 370 },
  { key: "Material", color: "#9a6a1f", pos: "bot", base: 590 },
];

/* ============================ HELPERS ============================ */
function normalize(s){ return String(s||"").toLowerCase().replace(/\s+/g," ").trim(); }
function findSelected(category, pilihan){
  if(!pilihan) return null;
  const np = normalize(pilihan);
  let m = category.options.find((o)=>normalize(o)===np);
  if(!m) m = category.options.find((o)=>normalize(o).includes(np)||np.includes(normalize(o)));
  return m || pilihan;
}
function trunc(s,n){ const str=String(s||""); return str.length>n?str.slice(0,n-1)+"…":str; }
function todayID(){
  try{ return new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"}); }
  catch{ return new Date().toDateString(); }
}
function buildPlainText(r, form){
  if(!r) return "";
  const L=[];
  L.push("ANALISA IDE PERBAIKAN (KAIZEN / CI)");
  L.push("====================================");
  L.push("Jabatan      : "+form.jabatan);
  L.push("Level Penilai: "+form.level);
  L.push("Tanggal      : "+todayID());
  L.push("");
  L.push("1. TEMA / JUDUL PROJECT\n"+(r.judul||"-"));
  L.push("");
  L.push("2. LATAR BELAKANG MASALAH\n"+(r.latarBelakang||"-"));
  L.push("");
  L.push("3. ANALISA MASALAH");
  L.push(r.analisaMasalah?.uraian||"-");
  L.push("\nCore Problem: "+(r.analisaMasalah?.coreProblem||"-"));
  L.push("Analisa Sebab-Akibat: "+(r.analisaMasalah?.sebabAkibat||"-"));
  const fb=r.analisaMasalah?.fishbone||{};
  L.push("\nDiagram Sebab-Akibat (Fishbone) - Akibat: "+(fb.effect||"-"));
  ["Manusia","Mesin","Metode","Material","Lingkungan"].forEach((k)=>{
    const a=Array.isArray(fb[k])?fb[k]:[];
    L.push("  "+k+": "+(a.length?a.join("; "):"-"));
  });
  L.push("");
  L.push("4. USULAN PERBAIKAN\n"+(r.usulanPerbaikan||"-"));
  L.push("");
  L.push("5. DESKRIPSI METODE BARU SETELAH PERBAIKAN\n"+(r.metodeBaruSetelahPerbaikan||"-"));
  L.push("");
  L.push("6. EVALUASI HASIL PERBAIKAN\n"+(r.evaluasiHasil||"-"));
  L.push("");
  L.push("7. RINGKASAN PROJECT\n"+(r.ringkasanProject||"-"));
  L.push("");
  L.push("8. BENEFIT YANG DIHASILKAN");
  BENEFIT_CATEGORIES.forEach((c)=>{
    const b=r.benefit?.[c.key]||{};
    L.push("  - "+c.label+": "+(findSelected(c,b.pilihan)||"-"));
    L.push("    Alasan: "+(b.alasan||"-"));
  });
  return L.join("\n");
}

/* ============================ SUBCOMPONENTS ============================ */
function Prose({ text }){
  if(!text) return <p className="ag-p" style={{color:"var(--ink-3)"}}>—</p>;
  const paras=String(text).split(/\n\s*\n/).map((s)=>s.trim()).filter(Boolean);
  const arr=paras.length?paras:[String(text)];
  return arr.map((p,i)=><p className="ag-p" key={i}>{p}</p>);
}

function Fishbone({ data }){
  const fb=data||{};
  const effect=fb.effect||"Problem Utama";
  const spineY=300, head=880;
  return (
    <svg viewBox="0 0 1100 580" style={{width:"100%",minWidth:820,height:"auto",display:"block"}}
      xmlns="http://www.w3.org/2000/svg" fontFamily="'JetBrains Mono', monospace">
      <line x1="70" y1={spineY} x2={head} y2={spineY} stroke="#1b1a17" strokeWidth="3"/>
      <polygon points={`${head},290 ${head+16},${spineY} ${head},310`} fill="#1b1a17"/>
      <rect x={head+12} y="250" width="190" height="100" rx="8" fill="#cf3b24"/>
      <foreignObject x={head+12} y="250" width="190" height="100">
        <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",
          textAlign:"center",padding:"8px 10px",boxSizing:"border-box",color:"#fff",fontWeight:800,
          fontSize:14,lineHeight:1.2,fontFamily:"'Archivo', sans-serif"}}>{effect}</div>
      </foreignObject>
      {FISH_CATS.map((cat)=>{
        const top=cat.pos==="top";
        const tipX=cat.base-120;
        const tipY=top?95:505;
        const causes=(Array.isArray(fb[cat.key])?fb[cat.key]:[]).slice(0,4);
        const colX=tipX-58;
        return (
          <g key={cat.key}>
            <line x1={cat.base} y1={spineY} x2={tipX} y2={tipY} stroke={cat.color} strokeWidth="2.5"/>
            <rect x={tipX-62} y={tipY-16} width="124" height="32" rx="16" fill={cat.color}/>
            <text x={tipX} y={tipY+5} textAnchor="middle" fill="#fff" fontWeight="700" fontSize="13"
              fontFamily="'Archivo', sans-serif" style={{textTransform:"uppercase",letterSpacing:".06em"}}>{cat.key}</text>
            {causes.map((c,i)=>{
              const y=top?tipY+34+i*17:tipY-28-i*17;
              return <text key={i} x={colX} y={y} fill="#3a382f" fontSize="11" fontFamily="'JetBrains Mono', monospace">{"• "+trunc(c,24)}</text>;
            })}
          </g>
        );
      })}
    </svg>
  );
}

function BenefitCard({ cat, value }){
  const Icon=cat.icon;
  const selected=findSelected(cat, value?.pilihan);
  return (
    <div className="ag-bcard">
      <div className="ag-bhead">
        <span className="ic"><Icon size={17}/></span>
        <span className="lb">{cat.label}</span>
      </div>
      <div className="ag-bopt">
        <span className="ck"><ICheck size={16}/></span>
        <span className="tx">{selected||"—"}</span>
      </div>
      <div className="ag-breason"><b>Alasan</b>{value?.alasan||"—"}</div>
    </div>
  );
}

function Section({ num, title, Icon, children }){
  return (
    <section className="ag-section" style={{animationDelay:(num*0.05)+"s"}}>
      <div className="ag-shead">
        <span className="ag-snum">{num}</span>
        <span className="ag-stitle">{title}</span>
        <span className="ag-sicon"><Icon size={20}/></span>
      </div>
      {children}
    </section>
  );
}

/* ============================ MAIN ============================ */
function App(){
  const [jabatan,setJabatan]=useState("");
  const [temuanProblem,setTemuan]=useState("");
  const [idePerbaikan,setIde]=useState("");
  const [level,setLevel]=useState("Section");
  const [password,setPassword]=useState(()=>{ try{return localStorage.getItem("ai_pwd")||"";}catch{return"";} });
  const [needPassword,setNeedPassword]=useState(false);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);
  const [copied,setCopied]=useState(false);
  const resultRef=useRef(null);

  const ready=jabatan.trim()&&temuanProblem.trim()&&idePerbaikan.trim();
  const form={jabatan,temuanProblem,idePerbaikan,level};

  async function handleGenerate(){
    if(!ready||loading) return;
    setLoading(true); setError("");
    try{
      const res=await fetch("/api/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({jabatan,temuanProblem,idePerbaikan,level,password}),
      });
      const data=await res.json().catch(()=>({}));
      if(res.status===401){
        setNeedPassword(true);
        setError(data.error||"Aplikasi ini dilindungi password. Masukkan password lalu klik Generate lagi.");
        setLoading(false);
        return;
      }
      if(!res.ok) throw new Error(data.error||("HTTP "+res.status));
      const r=data.result||data;
      setResult(r);
      setNeedPassword(false);
      try{ if(password) localStorage.setItem("ai_pwd",password); }catch{}
      setTimeout(()=>{ resultRef.current && resultRef.current.scrollIntoView({behavior:"smooth",block:"start"}); },120);
    }catch(e){
      setError("Gagal membuat analisa: "+((e&&e.message)||"kesalahan tidak diketahui")+". Silakan coba lagi.");
    }finally{
      setLoading(false);
    }
  }

  async function handleCopy(){
    const txt=buildPlainText(result,form);
    try{ await navigator.clipboard.writeText(txt); }
    catch{
      const ta=document.createElement("textarea");
      ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); }catch{}
      document.body.removeChild(ta);
    }
    setCopied(true); setTimeout(()=>setCopied(false),1800);
  }

  function handleDownload(){
    const txt=buildPlainText(result,form);
    const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const safe=((result&&result.judul)||"analisa-ide").replace(/[^a-z0-9]+/gi,"-").toLowerCase().slice(0,50);
    a.href=url; a.download=(safe||"analisa-ide")+".txt";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  const r=result;

  return (
    <div className="ag-root">
      <div className="ag-wrap">

        <header className="ag-header">
          <div className="ag-stamp"><b>{"改善"}</b><span>KAIZEN</span></div>
          <div className="ag-kicker">Continuous Improvement · Sistem Analisa Ide</div>
          <h1 className="ag-title">Generator <em>Analisa</em> Ide Perbaikan</h1>
          <div className="ag-sub">INPUT TEMUAN &amp; IDE → OUTPUT 8 BAGIAN ANALISA + FISHBONE + PENILAIAN BENEFIT</div>
        </header>

        <div className="ag-card">
          <div className="ag-card-h"><ISpark size={14}/> Data Pengusulan Ide</div>

          <div className="ag-field">
            <label className="ag-label"><span className="n">01</span> Jabatan</label>
            <input className="ag-input" value={jabatan} onChange={(e)=>setJabatan(e.target.value)}
              placeholder="cth: Operator Assembly Line / Teknisi Maintenance / Foreman Welding" />
          </div>

          <div className="ag-field">
            <label className="ag-label"><span className="n">02</span> Temuan Problem</label>
            <textarea className="ag-textarea" value={temuanProblem} onChange={(e)=>setTemuan(e.target.value)}
              placeholder="Jelaskan masalah/temuan yang Anda lihat di lapangan. cth: Proses setting jig manual memakan waktu lama dan sering miss, mengakibatkan part reject di line painting…" />
          </div>

          <div className="ag-field">
            <label className="ag-label"><span className="n">03</span> Ide Perbaikan</label>
            <textarea className="ag-textarea" value={idePerbaikan} onChange={(e)=>setIde(e.target.value)}
              placeholder="Jelaskan ide perbaikan yang Anda usulkan. cth: Membuat jig fixture dengan stopper presisi + pokayoke sensor agar setting cukup sekali pasang…" />
          </div>

          <div className="ag-field">
            <label className="ag-label"><span className="n">04</span> Level Assessment</label>
            <div className="ag-seg">
              {LEVELS.map((lv)=>(
                <button key={lv.id} className={"ag-seg-btn"+(level===lv.id?" active":"")} onClick={()=>setLevel(lv.id)}>{lv.label}</button>
              ))}
            </div>
          </div>

          {needPassword && (
            <div className="ag-pwd">
              <div className="t"><ILock size={13}/> Aplikasi ini dilindungi password</div>
              <input className="ag-input" type="password" value={password}
                onChange={(e)=>setPassword(e.target.value)}
                placeholder="Masukkan password akses dari admin"
                onKeyDown={(e)=>{ if(e.key==="Enter") handleGenerate(); }} />
            </div>
          )}

          <button className="ag-generate" onClick={handleGenerate} disabled={!ready||loading}>
            {loading ? (<><ILoader className="ag-spin" size={18}/> Menganalisa…</>) : (<><ISpark size={18}/> Generate Analisa Ide</>)}
          </button>
          <div className="ag-hint">
            {ready ? "AI (Gemini) akan menyusun analisa lengkap dalam Bahasa Indonesia yang natural." : "Lengkapi jabatan, temuan problem, dan ide perbaikan terlebih dulu."}
          </div>

          {error && (
            <div className="ag-error"><span style={{flex:"none",marginTop:1}}><IAlert size={16}/></span><span>{error}</span></div>
          )}
        </div>

        {r && (
          <div className="ag-doc" ref={resultRef}>
            <div className="ag-doc-head">
              <div className="ag-doc-tag">Lembar Analisa Ide Perbaikan · Kaizen / CI</div>
              <h2 className="ag-doc-title">{r.judul||"Analisa Ide Perbaikan"}</h2>
              <div className="ag-meta">
                <span className="ag-meta-item"><IBrief size={12}/> <b>{form.jabatan}</b></span>
                <span className="ag-meta-item"><IAward size={12}/> Level: <b>{form.level}</b></span>
                <span className="ag-meta-item"><IFile size={12}/> {todayID()}</span>
              </div>
            </div>

            <div className="ag-body">
              <Section num={1} title="Tema / Judul Project" Icon={IFile}>
                <p className="ag-p" style={{fontWeight:600,fontSize:18,color:"var(--ink)"}}>{r.judul||"—"}</p>
              </Section>

              <Section num={2} title="Latar Belakang Masalah" Icon={IAlert}>
                <div className="ag-prose"><Prose text={r.latarBelakang}/></div>
              </Section>

              <Section num={3} title="Analisa Masalah" Icon={ISearch}>
                <div className="ag-prose"><Prose text={r.analisaMasalah?.uraian}/></div>
                <div className="ag-callout">
                  <span className="k">Core Problem (Akar Masalah)</span>
                  <span className="v">{r.analisaMasalah?.coreProblem||"—"}</span>
                </div>
                <div className="ag-callout" style={{borderLeftColor:"var(--steel)",background:"rgba(51,83,110,.07)"}}>
                  <span className="k" style={{color:"var(--steel)"}}>Analisa Sebab–Akibat</span>
                  <span className="v">{r.analisaMasalah?.sebabAkibat||"—"}</span>
                </div>
                <div className="ag-fishbox">
                  <span className="ag-attach"><IFile size={11}/> Dokumen Lampiran</span>
                  <div className="ag-fishcap">Diagram Sebab–Akibat (Fishbone / Ishikawa) — 4M + Lingkungan</div>
                  <div className="ag-fishscroll"><Fishbone data={r.analisaMasalah?.fishbone}/></div>
                </div>
              </Section>

              <Section num={4} title="Usulan Perbaikan" Icon={IBulb}>
                <div className="ag-prose"><Prose text={r.usulanPerbaikan}/></div>
              </Section>

              <Section num={5} title="Deskripsi Metode Baru Setelah Perbaikan" Icon={IWrench}>
                <div className="ag-prose"><Prose text={r.metodeBaruSetelahPerbaikan}/></div>
              </Section>

              <Section num={6} title="Evaluasi Hasil Perbaikan" Icon={IClip}>
                <div className="ag-prose"><Prose text={r.evaluasiHasil}/></div>
              </Section>

              <Section num={7} title="Ringkasan Project" Icon={IList}>
                <div className="ag-prose"><Prose text={r.ringkasanProject}/></div>
              </Section>

              <Section num={8} title="Benefit yang Dihasilkan" Icon={IAward}>
                <div className="ag-bgrid">
                  {BENEFIT_CATEGORIES.map((cat)=>(
                    <BenefitCard key={cat.key} cat={cat} value={r.benefit?.[cat.key]}/>
                  ))}
                </div>
              </Section>
            </div>

            <div className="ag-actions">
              <button className="ag-act solid" onClick={handleCopy}>
                {copied ? (<><ICheck size={15}/> Tersalin</>) : (<><ICopy size={15}/> Salin Teks</>)}
              </button>
              <button className="ag-act ghost" onClick={handleDownload}><IDownload size={15}/> Unduh (.txt)</button>
              <button className="ag-act ghost" onClick={handleGenerate} disabled={loading}>
                {loading ? (<><ILoader className="ag-spin" size={15}/> Memproses</>) : (<><IRefresh size={15}/> Buat Ulang</>)}
              </button>
            </div>

            <div className="ag-note">
              <span style={{flex:"none",marginTop:1}}><IAlert size={13}/></span>
              <span>Catatan: angka before/after pada Evaluasi Hasil bersifat draf bantuan AI. Sesuaikan dengan data pengukuran aktual di lapangan sebelum diajukan secara resmi.</span>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
